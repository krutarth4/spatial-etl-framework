logging:
  enable: true
  dir: logs
  filename: pipeline.log
  level: INFO
  rotation:
    max_bytes: 10485760   # 10 MB per file
    backup_count: 7       # keep 7 rotated files → max ~80 MB total
    encoding: utf-8

server:
  app_type: core.main:app
  enable: true
  name: fastAPI
  description: "this is a API server used for debugging purpose to see the data call for faster development"
  host: 0.0.0.0
  port: 8000
  reload: True

runtime:
  config_watch:
    enable: true
    poll_seconds: 30

materialized_views:
  enable: true
  mv_folder: ./mv_configs/

scheduler:
  name: APSScheduler
  enable: false
  description: "This is a scheduler which helps to orchestrate the background task on either thread or process level"
  timezone: "Europe/Berlin"
  scheduler_type: BackgroundScheduler   #https://apscheduler.readthedocs.io/en/3.x/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
  wait_before_shutdown: false # should executor wait before shutdown to let jobs finish execution

data_folder: ./data_source_configs/

env_variables:
  base_schema: &db_schema exp_null
  base_table: &base_table_name ways_base

database:
  description: "Database used for APSScheduler + data storage"
  enable: true
  driver: "postgresql+psycopg" # for sqlalchemy
  url: ${{ os.getenv("DB_HOST") }}
  port: &port ${{ os.getenv("DB_PORT") }}
  database_name: &db_name ${{ os.getenv("DB_NAME") }} #postgres from osrm-postgis
  database_schema: *db_schema
  # Credentials: override locally via .env / environment; do NOT commit real values here.
  credential:
    username: &username ${{ os.getenv("DB_USER") }}
    password: &pass ${{ os.getenv("DB_PASSWORD") }}

  performance:
    # Batch processing configuration for large SQL operations
    enable_batching: true
    default_batch_size: 100000  # Number of rows per batch for INSERT/UPDATE operations

  pool:
    # SQLAlchemy connection pool configuration
    pool_size: 10
    max_overflow: 10
    pool_pre_ping: true
    echo: false
    application_name: "Spatial-ETL-pipeline"

metadata-datasource:
  description: "this will contain all the data realted to data sources to store particular information"
  table_schema: *db_schema

base:
  table_name: *base_table_name
  table_schema: *db_schema
  force_generate: false # To generate brand new table the other base tabkle will be backed up

# Reusable base_table block — merge into per-datasource mapping with <<: *base_table_conf
_base_table_conf: &base_table_conf
  table_name: *base_table_name
  table_schema: *db_schema

# Defaults merged into every datasource mapping block (fills missing keys only)
mapping_defaults:
  table_schema: *db_schema
  incremental: false


graph:
  enable: false # TODO prepare main graph tables for nodes and links
  tool: external_ingest # terminal or custom local tool either use osm2pgrouting with config.xml to create the initial tables or custom osmosis class with the help of handler
  communication:
    enable: true # set false to run standalone without comm/router waits
    state_file: tmp/comm_state.json # JSON snapshot; router reads/writes via HTTP endpoints below
    router:
      base_url: http://localhost:8082 # e.g. http://router:9000; when set, pipeline POSTs status changes to {base_url}/comm/tasks/{key}
      timeout_seconds: 5
    tasks:
      - key: read_osm_file
        owner: router
        status: idle
        is_completed: false
      - key: main_ways_table
        owner: router
        status: idle
        is_completed: false
      - key: ways_base_table
        owner: mdp
        status: idle
        is_completed: false
      - key: osm_file_update
        owner: mdp
        status: idle
        is_completed: false
      - key: osm_file_download
        owner: mdp
        status: idle
        is_completed: false
    waits:
      router_coupled:
        enable: false
        task_key: osm_graph
        poll_seconds: 5
        timeout_seconds: null
      main_ways_before_base:
        enable: true
        task_key: main_ways_table
        poll_seconds: 5
        timeout_seconds: null
        require_is_completed: true

  schema: *db_schema  # table schema
  table_name: way_segment #links
  env:
    pass: ${{ os.getenv("DB_PASSWORD") }}
  osm_file_path: &osmfile "./tmp/osm_graph/berlin.osm.pbf"
  datasource:
    - name: "osm_graph"
      description: "gets weather station data with their location"
      enable: true # to use the data source or not
  #    check_before_update: false
      class_name: graph
      debug:
        endpoint: osm-graph
      data_type: static # static / Dynamic
      source:
        fetch: http #http \ local
        mode: single # can be single or multi
        check_metadata: # The api doesn't support the implicit header request
          enable: true
          keys: [ "last_modified" ]
        url: "https://download.geofabrik.de/europe/germany/berlin-latest.osm.pbf"
        stream: True
        save_local: True
        destination: &dest "./tmp/osm_graph/berlin.osm.pbf" # path where to save the response
        response_type: pbf # the response type

      job:
        name: graphJob
        id: graphJob
  #      executor: process
        trigger:
          # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
          type:
            name: interval # interval , cron, date
            start_date: 2025-12-21T11:15:00
            config: # should be same key value pair to for job
              days: 15

        replace_existing: true
        coalesce: true
        max_instances: 1
        next_run_time: none
      mapping:
        enable: true
        incremental: false
        joins_on: dwd_station_id # link id column to join the table to
        table_name: dwd_mapping_stations
        table_schema: *db_schema
        base_table:
          table_name: *base_table_name
          table_schema: *db_schema
          column_name: "dwd_station_id"
          column_type: String
      storage:
        force_create: false
        persistent: false # true | false -> to store the values or not
        expires_after: 6h # how long to keep the data before again running the new process for persistency
        staging:
          table_name: dwd_station_locations
          table_schema: *db_schema
          table_class: DwdStationsTable
          persistent: false
        enrichment:
          table_name: dwd_weather_station_enrichment
          table_schema: *db_schema
          table_class: StationLocationLink # create class file to be liknked to the table

  cmd: [ "osm2pgrouting",
         "-f", "./tmp/osm_graph/berlin_latest.osm" ,"-d", *db_name,
         "-p", *port,
         "-U", *username,
         "-W", *pass,
         "-c", "mapconfig.xml",
         "--schema", *db_schema,"--no-index" ]


datasources:
  - name: "weather_station_bright_sky"
    description: "gets weather station data with their location"
    enable: true # to use the data source or not
#    check_before_update: false
    class_name: weatherStation
    debug:
      endpoint: weather-station
    table_name: &s1 dwd_station_locations
    data_type: static # static / Dynamic
    source:
      fetch: http #http \ local
      mode: single # can be single or multi
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "last_modified" ]
      url: https://api.brightsky.dev/sources
      stream: True
      save_local: True
      destination: "tmp/brightsky/stations/weatherStation.json" # path where to save the response
      response_type: json # the response type
      header:
        Accept: "application/json"
      params:
        dwd_station_id: ["00399", "00403", "00400", "00410", "00420", "00427", "00430", "00433"]
    job:
      name: weatherJob
      id: weatherJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          start_date: 2025-12-21T11:15:00 # Example of start config for the dateTime , if given calculates execution dateTime for next run
          config: # should be same key value pair to for job
            hours: 10

      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: true
      incremental: true
      joins_on: dwd_station_id
      table_name: dwd_station_locations_mapping
      strategy:
        type: knn
        link_on:
          mapping_column: dwd_station_id
          base_column: dwd_station_id
          basis: nearest_by_distance
      config:
        base_geometry_column: geometry
        enrichment_geometry_column: point
        distance_sql: ST_Distance({base_geometry}::geography, {enrichment_geometry}::geography)
        order_by_sql: ST_Distance({base_geometry}::geography, {enrichment_geometry}::geography)
        select_columns:
          - expression: |
              MOD(
                (DEGREES(
                  ST_Azimuth(
                    ST_StartPoint({base_geometry}),
                    ST_EndPoint({base_geometry})
                  )
                ) + 360)::NUMERIC,
                360
              )
            alias: bearing_degree
      base_table:
        <<: *base_table_conf
        column_name: "dwd_station_id"
        column_type: String
    storage:
      force_create: false
      persistent: true # true | false -> to store the values or not
      staging:
        table_name: dwd_station_locations_staging
        table_schema: *db_schema
        table_class: DwdStationsTable
        persistent: false
      enrichment:
        table_name: dwd_station_locations_enrichment
        table_schema: *db_schema
        table_class: DwdWeatherStationEnrichmentTable # create class file to be liknked to the table

  - name: "weather_forecast_bright_sky"
    description: "get weather forecast for the dwd_stations in params with hourly forecast "
    enable: true # to use the data source or not
    class_name: weather
    debug:
      endpoint: weather-forecast
    data_type: dynamic
    source:
      fetch: http #http \ local
      mode: multi
      check_metadata:
        enable: false
      url: https://api.brightsky.dev/weather
      multi_fetch:
        enable: true
        strategy: expand_params # could be expand_params for different params, url_template, EXPLICIT_URL_LIST contains a lot of urls
        expand:
          dwd_station_id: ["00399", "00403", "00400", "00410", "00420", "00427", "00430", "00433"]
        params:
          date: >
            ${{
            from datetime import datetime
            from zoneinfo import ZoneInfo
            datetime.now(ZoneInfo("Europe/Berlin")).isoformat()
            }}
      stream: True
      save_local: true
      destination: "tmp/brightsky/weather-data/weather_forecast.json" # path where to save the response
      response_type: json # the response type
      header:
        Accept: "application/json"
    job:
      name: weatherForecastJob
      id: weatherForecastJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          start_date: 2025-12-21T11:15:00 # Example of start config for the dateTime , if given calculates execution dateTime for next run
          config: # should be same key value pair to for job
            hours: 10

      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: false
      joins_on: way_id
      base_table:
        <<: *base_table_conf
        column_name: "station"
        column_type: Integer
    storage: # this information will be used to for metadata storage
      force_create: false
      enrichment:
        table_name: weather_enrichment
        table_schema: *db_schema
        table_class: WeatherEnrichmentTable # create class file to be liknked to the table
      persistent: true # true | false -> to store the values or not
      expires_after: 1d # how long to keep the data before again running the new process for persistency
      staging:
        table_name: weather_staging
        table_schema: *db_schema
        table_class: WeatherStagingTable
        persistent: false

  - name: "air_quality_data_download"
    description: "Air quality data from the dcaiti Tu Berlin server"
    enable: true # to use the data source or not
#    check_before_update: false
    class_name: airQualityData
    debug:
      endpoint: air-quality
    data_type: dynamic
    source:
      fetch: http #http \ local
      mode: multi
      check_metadata:
        enable: true
        keys: [ "last_modified" ]
      url: https://werkzeug.dcaiti.tu-berlin.de/fairqberlin/
      multi_fetch:
        enable: true
        strategy : url_template
        url_template: https://werkzeug.dcaiti.tu-berlin.de/fairqberlin/inwt_fairq_cache_skip_{skip}_limit_100000.json.gz #tmp/test{id}.xyz #"https://dummyjson.com/products/{productId}"
        template_params:
          skip: [0, 100000, 200000, 300000]
      stream: True
      save_local: true
      destination: "tmp/dcaiti/airqualityAPI/fairq.gz" # path where to save the response
      response_type: json.gz # the response type
      header:
        Accept:
    job:
      name: airPollutionJob
      id: airPollutionJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          config: # should be same key value pair to for job
            hours: 8

      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: true
      joins_on: way_id
      table_name: air_pollution_grid_mapping
      strategy:
        type: sql_template
      config:
        sql_file: mapping_sql/air_quality.sql
      base_table:
        <<: *base_table_conf
        column_name: "air_pollution"
        column_type: Integer
    storage: # this information will be used to for metadata storage
      persistent: true # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency
      staging:
        table_name: air_pollution_grid
        table_schema: *db_schema
        table_class: AirPollutionGridStagingTable
      enrichment:
        table_name: air_pollution_grid_enrichment
        table_schema: *db_schema
        table_class: AirPollutionGridEnrichmentTable

  - name: elevation_grids_links
    description: " 1m elevation Grid links "
    enable: true # to use the data source or not
    #    check_before_job_run: true
    check_before_update: true
    class_name: elevationGrid
    debug:
      endpoint: elevation-grids
    data_type: dynamic # static / Dynamic
    source:
      input: none
      mode: single
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "last_modified" ] # check for the keys in header metadata
      url: https://gdi.berlin.de/data/dgm1/atom/0.atom
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: True
      destination: "tmp/elevation_grid/elevation.xml" # path where to save the response
      response_type: xml # the response type
      header:
        Accept: "application/atom+xml"
      params:
    before_filter_hook:
      enable: true
    after_filter_hook:
      save: true
      destination: &gridlinks data/grid/elevation_grid_links.json # should be explicit the name not the internal naming mechanism
    before_load_hook:
      enable: false
    post-database-processing:
      enable: false
    job:
      name: elevationJob
      id: elevationJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          config:
            hours: 168   # re-run every 7 days
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: false
      joins_on: id
      base_table:
        <<: *base_table_conf
        column_name: "elevation_factor"
        column_type: Integer
    storage: # DB storage
      persistent: false # true | false -> to store the values or not

  - name: elevation
    description: " 1m elevation "
    enable: false # to use the data source or not
#    check_before_update: false # only valid for api call
    class_name: elevation
    debug:
      endpoint: elevation
    data_type: static # static / Dynamic
    source:
      input: none
      mode: multi
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "last_modified" ] # check for the keys in header metadata
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: True
      destination: "tmp/elevation_zips/elevation.zip" # path where to save the response
      response_type: zip # the response type
      multi_fetch:
        enable : true
        strategy: explicit_url_list
        urls:
          input: *gridlinks
    job:
      name: elevationJob
      id: elevationJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: run_once # interval , cron, date
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: true
      joins_on: id
      table_name: elevation_mapping
      strategy:
        type: sql_template
      config:
        sql_file: mapping_sql/elevation.sql
      base_table:
        <<: *base_table_conf
        column_name: "elevation_factor"
        column_type: Integer
    storage: # DB storage
      persistent: true # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency
      #10h 10m 55s 324ms -> this dataset took around 2-3 hours
      staging:
        table_name: elevation_staging
        table_schema: *db_schema
        table_class: ElevationStagingTable
      enrichment:
        table_name: elevation_enrichment
        table_schema: *db_schema
        table_class: ElevationEnrichmentTable

  - name: elevation_python
    description: " 1m elevation "
    enable: true # to use the data source or not
#    check_before_update: false # only valid for api call
    class_name: elevationPython
    debug:
      endpoint: elevation-python
    data_type: static # static / Dynamic
    source:
      input: none
      mode: multi
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "last_modified" ] # check for the keys in header metadata
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: True
      destination: "tmp/elevation_zips/elevation.zip" # path where to save the response
      response_type: zip # the response type
      multi_fetch:
        enable : true
        strategy: explicit_url_list
        urls:
          input: *gridlinks
    job:
      name: elevationPythonJob
      id: elevationPythonJob
      executor: process
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: run_once # interval , cron, date
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: true
      joins_on: way_id
      table_name: elevation_python_mapping
      strategy:
        type: sql_template
      config:
        sql_file: mapping_sql/elevation_python.sql
      base_table:
        <<: *base_table_conf
        column_name: "elevation_factor"
        column_type: Integer
    storage: # DB storage
      persistent: true # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency
      #10h 10m 55s 324ms -> this dataset took around 2-3 hours
      staging:
        table_name: elevation_python_staging
        table_schema: *db_schema
        table_class: ElevationPythonStagingTable

  - name: tree_wfs_capabilities
    description: " tree data for the streets "
    enable: false # to use the data source or not
#    check_before_update: false # only valid for api call
    class_name: treeWfsCapabilities
    debug:
      endpoint: tree-wfs-capabilities
    data_type: static # static / Dynamic
    source:
      input: none
      mode: single
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "content_length" ] # check for the keys in header metadata
      file_path: ""
      fetch: http #http \ local
      url: "https://gdi.berlin.de/services/wfs/baumbestand"
      stream: True
      save_local: True
      destination: "tmp/tree_wfs/capabilities/tree_capabilities.xml" # path where to save the response
      response_type: xml # the response type
      params:
        service: wfs
        version: "2.0.0"
        request: "GetCapabilities"
#        typenames: "baumbestand:anlagenbaeume"
#        outputFormat: application/json
#        count: 5000

    job:
      name: treeJob
      id: treeJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          start_date: 2025-12-21T11:15:00 # Example of start config for the dateTime , if given calculates execution dateTime for next run
          config: # should be same key value pair to for job
            hours: 10
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
      executor: process
    mapping:
      enable: false
      joins_on: id
      base_table:
        <<: *base_table_conf
        column_name: "elevation_factor"
        column_type: Integer
    storage: # DB storage
      persistent: false # true | false -> to store the values or not
      expires_after: 6h
      staging:
        table_name: tree
        table_schema: *db_schema
        table_class: TreeTabl
      enrichment:
        table_name: tree
        table_schema: *db_schema
        table_class: TreeTabl

  - name: tree
    description: " Get Trees on the side of the road within 50 m distance "
    enable: true # to use the data source or not
#    check_before_update: false # only valid for api call
    class_name: tree
    debug:
      endpoint: tree
    data_type: static # static / Dynamic
    source:
      input: none
      mode: multi
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "content_type" ] # check for the keys in header metadata
      file_path: ""
      fetch: http #http \ local
      url: "https://gdi.berlin.de/services/wfs/baumbestand"
      stream: True
      save_local: True
      destination: "tmp/tree_wfs/tree_ablage/gpkg_packet.gpkg" # path where to save the response
      response_type: gpkg # the response type
      multi_fetch:
        enable : true
        strategy: expand_params # could be expand_params for different params, url_template, EXPLICIT_URL_LIST contains a lot of urls
        expand:
          typenames: ["baumbestand:anlagenbaeume","baumbestand:strassenbaeume"]

        params:
          service: wfs
          version: "2.0.0"
          request: "GetFeature"
          outputFormat: geopackage
#          count: 10000
          sortBy: gisid


    job:
      name: treeJob
      id: treeJob
      executor: process
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          start_date: 2025-12-21T11:15:00 # Example of start config for the dateTime , if given calculates execution dateTime for next run
          config: # should be same key value pair to for job
            hours: 10
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: 00:00:00
    mapping:
      enable: true
      table_name: tree_mapping
      joins_on: id
      strategy:
        type: aggregate_within_distance
      config:
        max_distance: 50
        base_geometry_column: geometry_25833
        enrichment_geometry_column: geometry_25833
        aggregation_type: jsonb_build_object
        aggregation_expression: |
          COALESCE(
            jsonb_agg(
              jsonb_build_object(
                'tree_id', {enrichment_alias}.id,
                'source_id', {enrichment_alias}.source_id,
                'distance_m', ST_Distance({enrichment_alias}.geometry_25833, {base_geometry})
              )
              ORDER BY ST_Distance({enrichment_alias}.geometry_25833, {base_geometry})
            ) FILTER (WHERE {enrichment_alias}.id IS NOT NULL),
            '[]'::jsonb
          )
        aggregation_alias: trees
      base_table:
        <<: *base_table_conf
        column_name: "elevation_factor"
        column_type: Integer
    storage: # DB storage
      persistent: true # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency
      staging:
        table_name: tree_staging
        table_schema: *db_schema
        table_class: TreeStaging

  - name: pleasant_bicycling
    description: " Get the density of vehicles on the road "
    enable: true # to use the data source or not
#    check_before_update: false # only valid for api call
    class_name: pleasantBicycling
    debug:
      endpoint: pleasant-bicycling
    data_type: dynamic # static / Dynamic
    source:
      input: none
      mode: single
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "content_type" ] # check for the keys in header metadata
      file_path: data/pleasant_bicycle/aggregated_metrics.parquet
      fetch: local #http \ local
      stream: True
      save_local: True
      destination: "tmp/pleasant_bicycle/pleasant.csv" # path where to save the response
      response_type: csv # the response type
      multi_fetch:
        enable : false
        strategy: expand_params # could be expand_params for different params, url_template, EXPLICIT_URL_LIST contains a lot of urls
    job:
      name: pleasantJob
      id: pleasantJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          start_date: 2025-12-21T11:15:00 # Example of start config for the dateTime , if given calculates execution dateTime for next run
          config: # should be same key value pair to for job
            hours: 10 # interval , cron, date
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: 00:00:00
    mapping:
      enable: true
      table_name: pleasant_mapping
      joins_on: connection_id
      strategy:
        # Custom LEFT JOIN LATERAL — every way_base gets a row; unmatched ways
        # receive connection_id = NULL (handled gracefully by mv_pleasant and Java scorer).
        # SQL is built in PleasantBicyclingMapper.mapping_db_query().
        type: custom
      base_table:
        <<: *base_table_conf
        column_name: "pleasant_score"
        column_type: Float
    storage: # DB storage
      persistent: true # true | false -> to store the values or not
      # expires_after removed: dataset takes ~50 min to ETL (4M rows).
      # Aggressive expiry + container restarts cause an infinite reset loop.
      # Freshness is managed by the 10h job interval + _downstream_tables_are_populated().
      #10h 10m 55s 324ms -> this dataset took around 2-3 hours
      staging:
        table_name: pleasant_staging
        table_schema: *db_schema
        table_class: PleasantStagingTable
      enrichment:
        table_name: pleasant_enrichment
        table_schema: *db_schema
        table_class: PleasantEnrichmentTable

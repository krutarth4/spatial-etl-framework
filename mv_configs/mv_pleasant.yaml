# =============================================================================
# Materialized View: mv_pleasant
# Per-way pleasant/stress bicycling snapshot across all time intervals.
# Schema reference: docs/materialized-views-reference.md
# =============================================================================

# ---- Identity --------------------------------------------------------------
id: mv_pleasant
name: mv_pleasant
schema: exp_null
description: "Per-way SPI (speed performance index) across all pleasant bicycling intervals"
enable: true

# ---- Handler selection -----------------------------------------------------
handler:
  class: GenericMaterializedViewHandler
  module: materialized_views.handlers

# ---- Triggers --------------------------------------------------------------
triggers:
  on_datasource_success:
    - pleasant_bicycling
  only_on_data_change: true

# ---- Dependencies ----------------------------------------------------------
depends_on:
  datasources:
    - pleasant_bicycling
  tables:
    - { schema: exp_null, name: ways_base }
    - { schema: exp_null, name: pleasant_mapping }
    - { schema: exp_null, name: pleasant_enrichment }

# ---- Definition ------------------------------------------------------------
definition:
  select_sql: |
    WITH intervals AS (
        SELECT DISTINCT interval_start, interval_end
        FROM {schema}.pleasant_enrichment
    )
    SELECT
        w.id,
        w.way_id                                              AS way_id,
        w.way_link_index,
        i.interval_start,
        i.interval_end,
        COALESCE(pe.avg_speed_performance_index, -1)          AS spi
    FROM {schema}.ways_base w
    CROSS JOIN intervals i
    LEFT JOIN {schema}.pleasant_mapping pm
        ON pm.way_id = w.id
    LEFT JOIN {schema}.pleasant_enrichment pe
        ON pe.connection_id = pm.connection_id
       AND pe.interval_start = i.interval_start
       AND pe.interval_end   = i.interval_end

# ---- Build options ---------------------------------------------------------
build:
  with_data: true
  tablespace: null
  storage_parameters: {}

# ---- Indexes ---------------------------------------------------------------
# Note: the covering index uses INCLUDE which requires a raw sql entry.
indexes:
  - name: idx_mv_pleasant_way_id
    columns: [way_id, interval_start]
    unique: false
    method: btree
    where: null
  - name: idx_mv_pleasant_way_idx
    columns: [way_id]
    unique: false
    method: btree
    where: null
  - sql: |
      CREATE INDEX IF NOT EXISTS idx_mv_pleasant_way_id_covering
      ON {schema}.mv_pleasant (way_id)
      INCLUDE (way_link_index, interval_start, interval_end, spi);

# ---- Refresh behavior ------------------------------------------------------
refresh:
  enabled: true
  mode: normal
  with_data: true

load:
  - tool:
      name: osm_import
      description: "Import processed OSM data into PostGIS"
      kind: cli
      tool: osm2pgsql
      input: ${get_z_osm.osm}
      command:
        executable: "osm2pgsql"
        args: #write each command in new line TODO: change it with mapping , error when passed in same line as considered string
          - osm2pgsql
          - -c
          - -d
          - osm_berlin
          - -H
          - localhost
          - -P
          - "5433"
          - -U
          - postgres
          - -r
          - 'pbf'
          - ../raw/berlin.osm.pbf
          - -S
          - ../default.style
          - -v
        env:
          PGPASSWORD: "admin123"
# =============================================================================
# Materialized View: mv_pleasant
# One row per way segment. SPI values are stored as a 24-element float array,
# one entry per hour of the day (index 0 = 00:00–01:00, index 23 = 23:00–24:00).
# Missing hours (no bicycle data for that hour) are stored as -1.
#
# Source data resolution: 15-minute slots in pleasant_staging.
# Enrichment step averages 4 slots per hour → pleasant_enrichment (~1 M rows).
# This MV then joins ways_base × generate_series(0,23) × enrichment — only
# 24 M intermediate rows vs the previous 96 M — and collapses to 1 row per way.
#
# Schema reference: docs/materialized-views-reference.md
# =============================================================================

# ---- Identity --------------------------------------------------------------
id: mv_pleasant
name: mv_pleasant
schema: exp_null
description: >
  Per-way hourly SPI (speed performance index) as a 24-element float array.
  spi_hourly[h] is the average speed performance index for hour h (0–23); -1 means no data.
enable: true

# ---- Handler selection -----------------------------------------------------
handler:
  class: GenericMaterializedViewHandler
  module: materialized_views.handlers

# ---- Triggers --------------------------------------------------------------
triggers:
  on_datasource_success:
    - pleasant_bicycling
  only_on_data_change: true

# ---- Dependencies ----------------------------------------------------------
depends_on:
  datasources:
    - pleasant_bicycling
  tables:
    - { schema: exp_null, name: ways_base }
    - { schema: exp_null, name: pleasant_mapping }
    - { schema: exp_null, name: pleasant_enrichment }

# ---- Definition ------------------------------------------------------------
definition:
  select_sql: |
    WITH hours AS (
        SELECT generate_series(0, 23) AS hour
    )
    SELECT
        w.id,
        w.way_id,
        w.way_link_index,
        array_agg(
            COALESCE(pe.avg_speed_performance_index, -1)
            ORDER BY h.hour
        )                                               AS spi_hourly
    FROM {schema}.ways_base w
    CROSS JOIN hours h
    LEFT JOIN {schema}.pleasant_mapping pm
        ON pm.way_id = w.id
    LEFT JOIN {schema}.pleasant_enrichment pe
        ON pe.connection_id = pm.connection_id
       AND pe.hour          = h.hour
    GROUP BY w.id, w.way_id, w.way_link_index

# ---- Build options ---------------------------------------------------------
build:
  with_data: true
  tablespace: null
  storage_parameters: {}

# ---- Indexes ---------------------------------------------------------------
indexes:
  - name: idx_mv_pleasant_id
    columns: [id]
    unique: true
    method: btree
    where: null
  - name: idx_mv_pleasant_way_id
    columns: [way_id, way_link_index]
    unique: false
    method: btree
    where: null
  - name: idx_mv_pleasant_way_id_only
    columns: [way_id]
    unique: false
    method: btree
    where: null

# ---- Refresh behavior ------------------------------------------------------
refresh:
  enabled: true
  mode: concurrently
  with_data: true

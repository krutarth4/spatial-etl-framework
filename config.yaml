  - name: elevation
    description: " 1m elevation "
    enable: false # to use the data source or not
#    check_before_update: false # only valid for api call
    class_name: elevation
    debug:
      endpoint: elevation
    data_type: static # static / Dynamic
    source:
      input: none
      mode: multi
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "last_modified" ] # check for the keys in header metadata
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: True
      destination: "tmp/elevation_zips/elevation.zip" # path where to save the response
      response_type: zip # the response type
      multi_fetch:
        enable : true
        strategy: explicit_url_list
        urls:
          input: *gridlinks
    job:
      name: elevationJob
      id: elevationJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: run_once # interval , cron, date
          config: # should be same key value pair to for job
            seconds: 15
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: true
      joins_on: id
      table_name: elevation_mapping
      table_schema: *db_schema
      strategy:
        type: sql_template
        description: sample elevation profile along each base way from raster tiles
      config:
        sql: |
          WITH sampled_points AS (
              SELECT
                  w.id AS way_id,
                  dp.path[1] AS path_idx,
                  dp.geom AS geom_25833
              FROM {base_schema}.{base_table} w
              CROSS JOIN LATERAL ST_DumpPoints(
                  ST_Segmentize(
                      ST_Transform(w.geometry, 25833),
                      100.0
                  )
              ) AS dp
          ),
          points_with_elevation AS (
              SELECT
                  sp.way_id,
                  sp.path_idx,
                  sp.geom_25833,
                  z_lookup.z
              FROM sampled_points sp
              LEFT JOIN LATERAL (
                  SELECT z
                  FROM (
                      SELECT ST_Value(r.rast, sp.geom_25833) AS z
                      FROM {enrichment_schema}.{enrichment_table} r
                      WHERE ST_Intersects(r.footprint_4326, ST_Transform(sp.geom_25833, 4326))
                  ) sampled_z
                  WHERE sampled_z.z IS NOT NULL
                  LIMIT 1
              ) AS z_lookup ON TRUE
          )
          INSERT INTO {mapping_schema}.{mapping_table} (way_id, elevation_profile)
          SELECT
              p.way_id AS way_id,
              jsonb_agg(
                  jsonb_build_object(
                      'x', ST_X(ST_Transform(p.geom_25833, 4326)),
                      'y', ST_Y(ST_Transform(p.geom_25833, 4326)),
                      'z', p.z
                  )
                  ORDER BY p.path_idx
              ) AS elevation_profile
          FROM points_with_elevation p
          WHERE p.z IS NOT NULL
          GROUP BY p.way_id
          ON CONFLICT (way_id)
          DO UPDATE SET
              elevation_profile = EXCLUDED.elevation_profile;
      base_table:
        table_name: *base_table_name
        table_schema: *db_schema
        column_name: "elevation_factor"
        column_type: Integer
    storage: # DB storage
      persistent: true # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency
      #10h 10m 55s 324ms -> this dataset took around 2-3 hours
      staging:
        table_name: elevation_staging
        table_schema: *db_schema
        table_class: ElevationStagingTable
      enrichment:
        table_name: elevation_enrichment
        table_schema: *db_schema
        table_class: ElevationEnrichmentTable

  - name: elevation_python
    description: " 1m elevation "
    enable: false # to use the data source or not
#    check_before_update: false # only valid for api call
    class_name: elevationPython
    debug:
      endpoint: elevation-python
    data_type: static # static / Dynamic
    source:
      input: none
      mode: multi
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "last_modified" ] # check for the keys in header metadata
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: True
      destination: "tmp/elevation_zips/elevation.zip" # path where to save the response
      response_type: zip # the response type
      multi_fetch:
        enable : true
        strategy: explicit_url_list
        urls:
          input: *gridlinks
    job:
      name: elevationPythonJob
      id: elevationPythonJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: run_once # interval , cron, date
          config: # should be same key value pair to for job
            seconds: 15
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: true
      joins_on: way_id
      table_name: elevation_python_mapping
      table_schema: *db_schema
      strategy:
        type: sql_template
        description: copy per-way elevation stats from staging into mapping table
      config:
        sql: |
          INSERT INTO {mapping_schema}.{mapping_table}
              (way_id, total_ascent, total_descent, max_slope, avg_slope, sample_count)
          SELECT way_id, total_ascent, total_descent, max_slope, avg_slope, sample_count
          FROM {staging_schema}.{staging_table}
          ON CONFLICT (way_id) DO UPDATE SET
              total_ascent  = EXCLUDED.total_ascent,
              total_descent = EXCLUDED.total_descent,
              max_slope     = EXCLUDED.max_slope,
              avg_slope     = EXCLUDED.avg_slope,
              sample_count  = EXCLUDED.sample_count;
      base_table:
        table_name: *base_table_name
        table_schema: *db_schema
        column_name: "elevation_factor"

# =============================================================================
# Materialized View: mv_ways_with_elevation
# Per-way elevation snapshot joining base ways with elevation_python_staging.
# Schema reference: docs/materialized-views-reference.md
# =============================================================================

# ---- Identity --------------------------------------------------------------
id: mv_ways_with_elevation
name: mv_ways_with_elevation
schema: exp_null
description: "Per-way elevation stats (ascent, descent, max slope) from the Python elevation pipeline"
enable: true

# ---- Handler selection -----------------------------------------------------
handler:
  class: GenericMaterializedViewHandler
  module: materialized_views.handlers

# ---- Triggers --------------------------------------------------------------
triggers:
  on_datasource_success:
    - elevation_python
  only_on_data_change: true

# ---- Dependencies ----------------------------------------------------------
depends_on:
  datasources:
    - elevation_python
  tables:
    - { schema: exp_null, name: ways_base }
    - { schema: exp_null, name: elevation_python_staging }

# ---- Definition ------------------------------------------------------------
definition:
  select_sql: |
    SELECT
        w.way_id AS way_id,
        w.way_link_index,
        COALESCE(e.total_ascent, 0.0)  AS total_ascent,
        COALESCE(e.total_descent, 0.0) AS total_descent,
        COALESCE(e.max_slope, 0.0)     AS max_slope
    FROM {schema}.ways_base w
    LEFT JOIN {schema}.elevation_python_staging e
        ON w.id = e.way_id

# ---- Build options ---------------------------------------------------------
build:
  with_data: true
  tablespace: null
  storage_parameters: {}

# ---- Indexes ---------------------------------------------------------------
indexes:
  - name: idx_mv_elevation_way_id
    columns: [way_id]
    unique: false
    method: btree
    where: null

# ---- Refresh behavior ------------------------------------------------------
refresh:
  enabled: true
  mode: normal
  with_data: true

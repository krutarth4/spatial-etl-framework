version: 1
name : osm
description: "Provides the OSM file for the selected target region "
url: https://download.geofabrik.de/index-v1.json
response: json
mapping :
  - features
  - [int]
  - properties
  - urls
  - pbf
target:
  localStorage: True
  findBy: "Berlin"

extract:
  source:
    kind: http            # http | file | s3 | gcs
    url: https://download.geofabrik.de/index-v1.json   # or local path
    format: json          # json | geojson | yaml
    headers: {}           # optional
    save_raw:
      enabled: true
      format: json
      path: ./_raw/source.json
  find:
    format: json
    when: "[query]=Berlin"
    query: '$.features[*].properties(?name="Berlin").urls.pbf'



    selects: # maybe make it as a filter selection so we filter json
      - name: pbf_urls
        query: c  # JSONPath
        expect: string                               # list | string | object
        required: true

    # Option B: keep entire parsed object (handy for archiving)
    keep_entire_object: true



transform:
  # Optional light transforms
  # - rename keys, filter, map, add constants, etc.
  map:
    - when: pbf_urls
      op: unique      # remove duplicates
    - when: pbf_urls
      op: sort

load:
  output:
    - kind: file
      when: pbf_urls
      path: ./out/pbf_urls.jsonl
      format: jsonl       # json | jsonl | yaml | csv
      record: ""         # write each item (list) as one line in JSONL


    - kind: file
      when: keep_entire_object
      path: ./out/full_source.yaml
      format: yaml

    - kind: postgres
      when: pbf_urls
      conn: "postgresql://user:pass@localhost:5432/osm"
      table: geofabrik_pbf
      mode: upsert        # insert | upsert | replace
      # how to shape each row from the item
      mapping:
        # item is a string URL; we turn it into a row
        columns:
          region: # parse from URL using a regex group
            from_regex:
              input: "$"  # the item itself
              pattern: ".*/([a-z\\-]+)/[a-z\\-]+-latest\\.osm\\.pbf$"
              group: 1
          url:
            from: "$"
          fetched_at:
            const: now
      indexes:
        - "CREATE INDEX IF NOT EXISTS geofabrik_pbf_url_idx ON geofabrik_pbf (url);"
# =============================================================================
# Materialized View: mv_weather
# One row per way segment. Wind/visibility forecasts are stored as float arrays,
# one entry per hour of the forecast window. Index i corresponds to
# forecast_start + i hours (forecast_start..forecast_end bound the window).
# Missing hours (no station forecast for that hour) are stored as -1.
#
# Each way maps to exactly one DWD station (dwd_station_locations_mapping), so the
# array values come from that station's hourly forecast. bearing_deg is the fixed
# travel bearing of the segment, used by the wind scorer together with
# wind_direction to compute head/tail-wind.
#
# Row count equals ways_base (one row per way), matching mv_tree / mv_pleasant.
#
# Schema reference: docs/materialized-views-reference.md
# =============================================================================

# ---- Identity --------------------------------------------------------------
id: mv_weather
name: mv_weather
schema: &dbschema exp_null
description: >
  Per-way hourly wind forecast as float arrays (wind_speed_hourly,
  wind_direction_hourly, visibility_hourly). Index i = forecast_start + i hours;
  -1 means no data. bearing_deg is the fixed segment travel bearing.
enable: true

# ---- Handler selection -----------------------------------------------------
handler:
  class: GenericMaterializedViewHandler
  module: materialized_views.handlers

# ---- Triggers --------------------------------------------------------------
triggers:
  on_datasource_success:
    # Only the forecast datasource fires this MV. The station mapping is read via
    # depends_on.tables below; listing both weather datasources made two ensure()/
    # refresh() calls race on CREATE INDEX.
    - weather_forecast_bright_sky
  only_on_data_change: true

# ---- Dependencies ----------------------------------------------------------
depends_on:
  datasources:
    - weather_forecast_bright_sky
    - weather_station_bright_sky
  tables:
    - { schema: *dbschema, name: weather_enrichment }
    - { schema: *dbschema, name: dwd_station_locations_mapping }
    - { schema: *dbschema, name: ways_base }

# ---- Definition ------------------------------------------------------------
# One row per way. A forecast-window CTE builds the global hour slots; a LATERAL
# aggregate collapses each station's hourly forecast into per-way float arrays.
# LEFT JOINs keep every way even when it has no station mapping or no forecast.
definition:
  select_sql: |
    WITH bounds AS (
        SELECT
            date_trunc('hour', MIN("timestamp")) AS forecast_start,
            date_trunc('hour', MAX("timestamp")) AS forecast_end
        FROM {schema}.weather_enrichment
    ),
    slots AS (
        SELECT
            gs                                                       AS slot_ts,
            (EXTRACT(EPOCH FROM (gs - b.forecast_start)) / 3600)::int AS slot_idx
        FROM bounds b
        CROSS JOIN generate_series(b.forecast_start, b.forecast_end, INTERVAL '1 hour') AS gs
    )
    SELECT
        w.id,
        w.way_id,
        w.way_link_index,
        m.bearing_degree                       AS bearing_deg,
        (SELECT forecast_start FROM bounds)    AS forecast_start,
        (SELECT forecast_end   FROM bounds)    AS forecast_end,
        agg.wind_speed_hourly,
        agg.wind_direction_hourly,
        agg.visibility_hourly
    FROM {schema}.ways_base w
    LEFT JOIN {schema}.dwd_station_locations_mapping m
        ON m.way_id = w.id
    LEFT JOIN LATERAL (
        SELECT
            array_agg(COALESCE(e.wind_speed, -1)     ORDER BY s.slot_idx) AS wind_speed_hourly,
            array_agg(COALESCE(e.wind_direction, -1) ORDER BY s.slot_idx) AS wind_direction_hourly,
            array_agg(COALESCE(e.visibility, -1)     ORDER BY s.slot_idx) AS visibility_hourly
        FROM slots s
        LEFT JOIN {schema}.weather_enrichment e
            ON e.dwd_station_id::INTEGER = m.dwd_station_id::INTEGER
           AND date_trunc('hour', e."timestamp") = s.slot_ts
    ) agg ON TRUE

# ---- Build options ---------------------------------------------------------
build:
  with_data: true
  tablespace: null
  storage_parameters: {}

# ---- Indexes ---------------------------------------------------------------
indexes:
  - name: idx_mv_weather_id
    columns: [id]
    unique: true
    method: btree
    where: null
  - name: idx_mv_weather_way_id
    columns: [way_id, way_link_index]
    unique: false
    method: btree
    where: null
  - name: idx_mv_weather_way_id_only
    columns: [way_id]
    unique: false
    method: btree
    where: null

# ---- Refresh behavior ------------------------------------------------------
refresh:
  enabled: true
  mode: concurrently               # one row per way + unique index on id
  with_data: true

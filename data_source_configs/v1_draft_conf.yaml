server:
  app_type: core.main:app
  enable: False
  name: fastAPI
  description: "this is a API server used for debugging purpose to see the data call for faster development"
  host: 0.0.0.0
  port: 8000
  reload: True

scheduler:
  name: APSScheduler
  enable: false
  description: "This is a scheduler which helps to orchestrate the background task on either thread or process level"
  timezone: "Europe/Berlin"
  scheduler_type: BackgroundScheduler   #https://apscheduler.readthedocs.io/en/3.x/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
  wait_before_shutdown: false # should executor wait before shutdown to let jobs finish execution

data_folder: ./data_source_configs/
#SQLALCHEMY_DATABASE_URL = 'postgresql://postgres:Bright#1270@localhost/fastapi'

database:
  description: "Database used for APSScheduler + data storage"
  enable: true
  driver: "postgresql+psycopg" # for sqlalchemy
  url: localhost
  port: &port 5432
  database_name: &db_name test_runner #postgres from osrm-postgis
  database_schema: &db_schema "test_runner" # not a must
  credential:
    username: &username "postgres"
    password: &pass "admin123"

metadata-datasource:
  description: "this will contain all the data realted to data sources to store particular information"
base:
  table_name: &base_table_name ways_base
  table_schema: *db_schema
  force_generate: false # To generate brand new table the other base tabkle will be backed up


graph:
  enable: false # TODO prepare main graph tables for nodes and links
  tool: terminal # local tool either use osm2pgrouting with config.xml to create the initial tables or custom osmosis class with the help of handler
  cmd: [ "osm2pgrouting",
         "-f","./raw/ernst_extract.osm" ,"-d", *db_name,
         "-p", *port,
         "-U", *username,
         "-W", *pass,
         "-c", "mapconfig.xml",
         "--schema", *db_schema ]
  schema: *db_schema  # table schema
  table_name: ways
  check_before_update: false
  env:
    pass: test
  datasource:
    - name: "graphs_osm"
      description: "get geofabric API file and can filter for berlin from here "
      enable: true # to use the data source or not
      class_name: graphsOSM
      table_name: ""
      data_type: static # static / Dynamic
      check_before_update: true
      source:
        input: none
        url: https://api.brightsky.dev/sources
        file_path: ""
        fetch: http #http \ local
        run_once: True
        frequency: ""
        stream: True
        save_local: True
        destination: "tmp/weatherapi/weatherStation.json" # path where to save the response
        response_type: json # the response type
        header:
          Accept: "application/json"
        params:
          dwd_station_id:
            - "00399"
            - "00403"
            - "00400"
            - "00410"
            - "00420"
            - "00424"
            - "00427"
            - "00430"
            - "00433"
      job:
        name: weatherJob
        id: weatherJob
        trigger:
          # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
          type:
            name: interval # interval , cron, date
            config: # should be same key value pair to for job
              seconds: 15

        replace_existing: true
        coalesce: true
        max_instances: 1
        next_run_time: none
      mapping:
        enable: false
        joins_on: dwd_station_id # link id column to join the table to
        base_table:
          column_name: "dwd_station_id"
          column_type: String

      storage:
        table_name: "" #-> optional but must when persistent is true
        table_class: "" # create class file to be liknked to the table
        persistent: false # true | false -> to store the values or not
        expires_after: 6h # how long to keep the data before again running the new process for persistency




datasources:
  - name: "weather_station_bright_sky"
    description: "gets weather station data with their location"
    enable: false # to use the data source or not
    check_before_update: true
    class_name: weatherStation
    table_name: &s1 dwd_station_locations
    data_type: static # static / Dynamic
    source:
      input: none
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "last_modified" ]
      url: https://api.brightsky.dev/sources
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: True
      destination: "tmp/weatherapi/weatherStation.json" # path where to save the response
      response_type: json # the response type
      header:
        Accept: "application/json"
      params:
        dwd_station_id:
          - "00399"
          - "00403"
          - "00400"
          - "00410"
          - "00420"
          - "00424"
          - "00427"
          - "00430"
          - "00433"
    job:
      name: weatherJob
      id: weatherJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          config: # should be same key value pair to for job
            seconds: 15

      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: true
      joins_on: dwd_station_id # link id column to join the table to
      base_table:
        table_name: *base_table_name
        table_schema: *db_schema
        column_name: "dwd_station_id"
        column_type: String
    storage:
      table_name: *s1
      table_schema: *db_schema
      table_class: DwdStationsTable # create class file to be liknked to the table
      persistent: true # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency

  - name: "weather_forecast_bright_sky"
    description: "get weather forecast for the dwd_stations in params with hourly forecast "
    enable: false # to use the data source or not
    check_before_update: true
    class_name: weather
    table_name: &weathertable weather
    data_type: dynamic
    source:
      input: none
      check_metadata:
        enable: true
        keys: [ "last_modified" ]
      url: https://api.brightsky.dev/weather
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: true
      destination: "tmp/weatherapi/weatherForecast.json" # path where to save the response
      response_type: json # the response type
      header:
        Accept: "application/json"
      params:
    #        date: {date}
    job:
      name: weatherForecastJob
      id: weatherForecastJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          config: # should be same key value pair to for job
            seconds: 15

      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: false
      joins_on: dwd_station_id # link id column to join the table to
      base_table:
        table_name: *base_table_name
        table_schema: *db_schema
        column_name: "wind_forecast"
        column_type: Integer
    #      maps_on:
    storage: # this information will be used to for metadata storage
      table_name: *weathertable
      table_schema: *db_schema
      table_class: WeatherTable # create class file to be liknked to the table
      persistent: true # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency

  - name: "air_quality_data_download"
    description: "Air quality data from the dcaiti Tu Berlin server"
    enable: false # to use the data source or not
    check_before_update: false
    class_name: airQualityData
    table_name: &airtable air_pollution_grid
    data_type: dynamic
    source:
      input: none
      check_metadata:
        enable: false
      url: https://werkzeug.dcaiti.tu-berlin.de/fairqberlin/
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: true
      destination: "../tmp/airqualityAPI/" # path where to save the response
      response_type: json.gz # the response type
      header:
        Accept:
      params:
    #        date: {date}
    job:
      name: airPollutionJob
      id: airPollutionJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          config: # should be same key value pair to for job
            hour: 8

      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: true
      joins_on: id # link id column to join the table to
      base_table:
        table_name: *base_table_name
        table_schema: *db_schema
        column_name: "air_pollution"
        column_type: Integer
    #      maps_on:
    storage: # this information will be used to for metadata storage
      table_name: *airtable
      table_schema: *db_schema
      table_class: WeatherTable # create class file to be liknked to the table
      persistent: true # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency

  - name: elevation_grids
    description: " 1m elevation "
    enable: true # to use the data source or not
    #    check_before_job_run: true
    check_before_update: true
    class_name: elevationGrid
    table_name: &elevation elevation
    data_type: static # static / Dynamic
    source:
      input: none
      check_metadata: # The api doesn't support the implicit header request
        enable: true
        keys: [ "last_modified" ] # check for the keys in header metadata
      url: https://gdi.berlin.de/data/dgm1/atom/0.atom
      file_path: ""
      fetch: http #http \ local
      stream: True
      save_local: True
      destination: "tmp/elevation/elevation" # path where to save the response
      response_type: xml # the response type
      header:
        Accept: "application/atom+xml"
      params:
    pre-filter-processing:
      enable: true
    post_filter_processing:
      save: true
      destination: "data/elevation_links"
      type: json



    pre-database-processing:
      enable: false
    post-database-processing:
      enable: false
    job:
      name: elevationJob
      id: elevationJob
      trigger:
        # https://apscheduler.readthedocs.io/en/latest/userguide.html#choosing-the-right-scheduler-job-store-s-executor-s-and-trigger-s
        type:
          name: interval # interval , cron, date
          config: # should be same key value pair to for job
            seconds: 15
      replace_existing: true
      coalesce: true
      max_instances: 1
      next_run_time: none
    mapping:
      enable: false
      joins_on: id # link id column to join the table to
      base_table:
        table_name: *base_table_name
        table_schema: *db_schema
        column_name: "elevation_factor"
        column_type: Integer
    storage: # DB storage
      table_name: *elevation
      table_schema: *db_schema
      table_class: ElevationTable # create class file to be liknked to the table
      persistent: false # true | false -> to store the values or not
      expires_after: 6h # how long to keep the data before again running the new process for persistency



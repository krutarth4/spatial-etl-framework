# =============================================================================
# Materialized View: mv_ways_with_elevation
# Per-way elevation snapshot joining base ways with elevation_mapping.
#
# Boilerplate (schema, handler, build, refresh, triggers.only_on_data_change)
# is filled from config.yaml -> mv_defaults; refresh defaults to `concurrently`,
# which is valid here because of the unique (way_id, way_link_index) index.
# Schema reference: docs/materialized-views-reference.md
# =============================================================================
name: mv_ways_with_elevation
description: "Per-way elevation stats (ascent, descent, max slope) from the elevation pipeline"

triggers:
  on_datasource_success: [elevation]

depends_on:
  datasources: [elevation]
  tables:
    - { name: ways_base }
    - { name: elevation_mapping }

definition:
  select_sql: |
    SELECT
        w.way_id AS way_id,
        w.way_link_index,
        COALESCE(m.total_ascent, 0.0)  AS total_ascent,
        COALESCE(m.total_descent, 0.0) AS total_descent,
        COALESCE(m.max_slope, 0.0)     AS max_slope
    FROM {schema}.ways_base w
    LEFT JOIN {schema}.elevation_mapping m
        ON w.id = m.way_id

indexes:
  - { name: idx_mv_elevation_way_id_link, columns: [way_id, way_link_index], unique: true }
  - { name: idx_mv_elevation_way_id, columns: [way_id] }

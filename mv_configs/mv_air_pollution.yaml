# =============================================================================
# Materialized View: mv_air_pollution
# One row per way segment (same length as ways_base).
#
# Data flow:
#   air_pollution_grid_enrichment   (1 row per grid cell × forecast_time;
#                                    no2/pm10/pm25 are 106-element ARRAY[float]
#                                    of hourly forecasts starting at forecast_time)
#   → latest batch selected per grid cell
#   → dominant grid cell (largest intersection_length_m) selected per way
#   → arrays used as-is (no re-aggregation needed)
#   → LEFT JOINed to ways_base → exactly one row per way segment
#
# Output columns:
#   forecast_start  — UTC timestamp of array element [1] (1-based, PT1H spacing)
#   forecast_end    — UTC timestamp of the last array element
#   no2 / pm10 / pm25 — ARRAY[float], element i corresponds to
#                        forecast_start + (i-1) * 1 hour
#   Ways with no intersecting grid cells get NULL arrays.
#
# The Java AirQualityRouteScorer reads this by way_id and computes the array
# index from the route step's predicted traversal time relative to forecast_start.
#
# Schema reference: docs/materialized-views-reference.md
# =============================================================================

# ---- Identity --------------------------------------------------------------
id: mv_air_pollution
name: mv_air_pollution
schema: exp_null
description: >
  Per-way air pollution forecast (NO2, PM10, PM2.5) packed as float arrays.
  One row per way segment (same length as ways_base). Array element i maps to
  forecast_start + (i-1) hours. Values are taken from the dominant (largest
  intersection) 50 m grid cell per way.
enable: true

# ---- Handler selection -----------------------------------------------------
handler:
  class: GenericMaterializedViewHandler
  module: materialized_views.handlers

# ---- Triggers --------------------------------------------------------------
triggers:
  on_datasource_success:
    - air_quality_data_download
  only_on_data_change: true

# ---- Dependencies ----------------------------------------------------------
depends_on:
  datasources:
    - air_quality_data_download
  tables:
    - { schema: exp_null, name: ways_base }
    - { schema: exp_null, name: air_pollution_grid_enrichment }
    - { schema: exp_null, name: air_pollution_grid_mapping }

# ---- Definition ------------------------------------------------------------
definition:
  select_sql: |
    WITH latest_per_grid AS (
        -- Most recently ingested forecast batch per 50 m grid cell.
        SELECT DISTINCT ON (grid_id)
            grid_id,
            forecast_time,
            no2,
            pm10,
            pm25
        FROM {schema}.air_pollution_grid_enrichment
        WHERE no2          IS NOT NULL
          AND pm10         IS NOT NULL
          AND pm25         IS NOT NULL
          AND forecast_time IS NOT NULL
        ORDER BY grid_id, forecast_time DESC NULLS LAST, uid DESC
    ),
    forecast_meta AS (
        -- Global forecast window derived from the selected grid cells.
        SELECT
            timezone('UTC', MIN(forecast_time))                                          AS forecast_start,
            timezone('UTC',
                MIN(forecast_time) + (MAX(array_length(no2, 1)) - 1) * INTERVAL '1 hour'
            )                                                                            AS forecast_end
        FROM latest_per_grid
    ),
    dominant_grid AS (
        -- For each way, pick the single grid cell with the greatest intersection
        -- length. Adjacent 50 m cells are highly correlated (same interpolated
        -- model output), so blending adds no meaningful accuracy over the
        -- dominant cell.
        SELECT DISTINCT ON (m.way_id)
            m.way_id,
            lpg.no2,
            lpg.pm10,
            lpg.pm25
        FROM {schema}.air_pollution_grid_mapping m
        JOIN latest_per_grid lpg ON lpg.grid_id = m.grid_id
        ORDER BY m.way_id, m.intersection_length_m DESC
    )
    SELECT
        w.id,
        w.way_id,
        w.way_link_index,
        fm.forecast_start,
        fm.forecast_end,
        dg.no2,
        dg.pm10,
        dg.pm25
    FROM {schema}.ways_base w
    CROSS JOIN forecast_meta fm
    LEFT JOIN dominant_grid dg ON dg.way_id = w.id

# ---- Build options ---------------------------------------------------------
build:
  with_data: true
  tablespace: null
  storage_parameters: {}

# ---- Indexes ---------------------------------------------------------------
indexes:
  - name: mv_air_pollution_way_id_idx
    columns: [way_id]
    unique: false
    method: btree
    where: null
  - name: mv_air_pollution_id_idx
    columns: [id]
    unique: true
    method: btree
    where: null

# ---- Refresh behavior ------------------------------------------------------
refresh:
  enabled: true
  mode: normal
  with_data: true
